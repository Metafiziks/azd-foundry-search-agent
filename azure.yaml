# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: azd-foundry-search-agent
services:
    ai-project:
        project: ""
        host: azure.ai.project
        language: ""
        deployments: []
    search-agent:
        project: src/agent
        host: azure.ai.agent
        language: python
        uses:
            - ai-project
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: Azure AI Foundry hosted agent with document search capability.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: AZURE_SEARCH_ENDPOINT
              value: ${AZURE_SEARCH_ENDPOINT}
            - name: AZURE_SEARCH_INDEX
              value: ${AZURE_SEARCH_INDEX}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - AI Agent Hosting
                - Azure AI AgentServer
                - Responses Protocol
                - RAG
        name: search-agent
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
hooks:
    postdeploy:
        shell: sh
        run: bash scripts/postdeploy.sh
        interactive: true
    postprovision:
        shell: sh
        run: bash scripts/postprovision.sh
        interactive: true

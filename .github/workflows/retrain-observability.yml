name: Retrain ML Observability Models

on:
  schedule:
    # Every Sunday at 02:00 UTC — after the weekly eval run
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days of telemetry to train on (default: 30)"
        default: "30"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  retrain:
    name: Retrain IsolationForest
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install observability dependencies
        run: |
          pip install -q scikit-learn numpy \
            azure-identity azure-monitor-query azure-storage-blob

      - name: Retrain IsolationForest
        env:
          LOG_ANALYTICS_WORKSPACE_ID: ${{ vars.LOG_ANALYTICS_WORKSPACE_ID }}
          BLOB_ACCOUNT_URL: ${{ vars.BLOB_ACCOUNT_URL }}
          BLOB_MODEL_CONTAINER: models
          BLOB_MODEL_KEY: iforest.pkl
          RETRAIN_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
          MIN_RETRAIN_ROWS: "20"
        run: python3 observability/retrain.py

      - name: Upload retrain summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iforest-retrain-${{ github.run_id }}
          path: /tmp/iforest_retrained.pkl
          if-no-files-found: ignore
          retention-days: 30
